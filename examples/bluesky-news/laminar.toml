# Bluesky trending-hashtag detection.
# Jetstream firehose -> live trending hashtags + spike detection, all in SQL,
# SUBSCRIBE-able over pgwire on 5432. No auth, no Docker.
#
# Windows are event-time, keyed on Jetstream's `time_us` (epoch microseconds,
# decoded into a TIMESTAMP via `epoch_unit`). A bounded watermark (5s
# out-of-orderness) advances from the live max event time, so windows close
# continuously; backfill replayed on reconnect is older than the watermark and
# is dropped as late (standard late-data handling). The URL pins
# app.bsky.feed.post (~30-60/s); hashtags are common, so output is immediate.

sql = """
-- Source: nested JSON fields pulled out with json.column.<col> = '<dot.path>'.
-- time_us is epoch microseconds -> TIMESTAMP via .epoch_unit; the watermark
-- makes it the event-time axis for the windows below.
CREATE SOURCE bsky_jetstream_raw (
    event_time    TIMESTAMP,
    author_did    TEXT,
    text          TEXT,
    langs         ARRAY<TEXT>,
    kind          TEXT,
    operation     TEXT,
    collection    TEXT,
    WATERMARK FOR event_time AS event_time - INTERVAL '5' SECOND
) FROM WEBSOCKET (
    url    = 'wss://jetstream2.us-east.bsky.network/subscribe?wantedCollections=app.bsky.feed.post',
    format = 'json',
    'json.column.event_time'            = 'time_us',
    'json.column.event_time.epoch_unit' = 'micros',
    'json.column.author_did'            = 'did',
    'json.column.text'                  = 'commit.record.text',
    'json.column.langs'                 = 'commit.record.langs',
    'json.column.kind'                  = 'kind',
    'json.column.operation'             = 'commit.operation',
    'json.column.collection'            = 'commit.collection'
);

-- Subscribable raw feed: English post creates.
CREATE STREAM bsky_posts AS
SELECT event_time, author_did, text, langs
FROM bsky_jetstream_raw
WHERE collection = 'app.bsky.feed.post'
  AND operation  = 'create'
  AND (langs IS NULL OR array_has(langs, 'en'));

-- Hashtags per 5s: tokenize lowercased text, keep #tags. uses = mentions,
-- authors = distinct posters (so one user spamming a tag can't dominate).
CREATE MATERIALIZED VIEW bsky_hashtags_5s AS
SELECT TUMBLE(event_time, INTERVAL '5' SECOND) AS bucket, tag,
       COUNT(*) AS uses, COUNT(DISTINCT author_did) AS authors
FROM (
    SELECT event_time, author_did, unnest(string_to_array(lower(text), ' ')) AS tag
    FROM bsky_jetstream_raw
    WHERE collection = 'app.bsky.feed.post' AND operation = 'create'
)
WHERE regexp_like(tag, '^#[a-z][a-z0-9_]{1,29}$')
GROUP BY TUMBLE(event_time, INTERVAL '5' SECOND), tag
EMIT ON WINDOW CLOSE;

-- 5-minute per-hashtag baseline, normalized to an expected count per 5s bucket.
CREATE MATERIALIZED VIEW bsky_hashtag_baseline AS
SELECT TUMBLE(event_time, INTERVAL '5' MINUTE) AS win, tag,
       CAST(COUNT(*) AS DOUBLE) / 60.0 AS expected_per_5s
FROM (
    SELECT event_time, unnest(string_to_array(lower(text), ' ')) AS tag
    FROM bsky_jetstream_raw
    WHERE collection = 'app.bsky.feed.post' AND operation = 'create'
)
WHERE regexp_like(tag, '^#[a-z][a-z0-9_]{1,29}$')
GROUP BY TUMBLE(event_time, INTERVAL '5' MINUTE), tag
EMIT ON WINDOW CLOSE;

-- Spiking hashtags: each 5s bucket vs the latest baseline for its tag.
-- (Baseline warms up over the first 5 minutes; spikes get a ratio after that.)
CREATE MATERIALIZED VIEW bsky_hashtag_spikes AS
SELECT c.bucket, c.tag, c.uses, c.authors,
       CAST(c.uses AS DOUBLE) / NULLIF(b.expected_per_5s, 0) AS spike_ratio
FROM bsky_hashtags_5s c ASOF JOIN bsky_hashtag_baseline b
  MATCH_CONDITION(c.bucket >= b.win) ON c.tag = b.tag;
"""

[server]
bind        = "127.0.0.1:7777"
pgwire_bind = "127.0.0.1:5432"
