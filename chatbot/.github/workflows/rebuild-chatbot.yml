name: Rebuild chatbot index
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'README.md'
      - 'chatbot/build-index.mjs'   # reindex if the indexer itself changes

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  reindex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Rebuild Vectorize index
        working-directory: chatbot   # folder where build-index.mjs lives
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # built-in, no setup needed
        run: node build-index.mjs

      - name: Deploy Worker
        working-directory: chatbot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy