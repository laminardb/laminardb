apiVersion: v1
kind: Service
metadata:
  name: {{ include "laminardb.fullname" . }}
  labels:
    {{- include "laminardb.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.pgEnabled }}
    - port: {{ .Values.service.pgPort }}
      targetPort: pg
      protocol: TCP
      name: pg
    {{- end }}
    {{- if eq .Values.laminardb.mode "delta" }}
    - port: {{ .Values.service.gossipPort }}
      targetPort: gossip
      protocol: TCP
      name: gossip
    - port: {{ .Values.service.raftPort }}
      targetPort: raft
      protocol: TCP
      name: raft
    {{- end }}
  selector:
    {{- include "laminardb.selectorLabels" . | nindent 4 }}
