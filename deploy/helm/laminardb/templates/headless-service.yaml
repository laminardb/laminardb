{{- $isCluster := eq .Values.laminardb.mode "cluster" -}}
{{- if or .Values.headlessService.enabled $isCluster }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "laminardb.headlessServiceName" . }}
  labels:
    {{- include "laminardb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if $isCluster }}
    - port: {{ .Values.service.gossipPort }}
      targetPort: gossip
      protocol: TCP
      name: gossip
    - port: {{ .Values.service.raftPort }}
      targetPort: raft
      protocol: TCP
      name: raft
    {{- end }}
  selector:
    {{- include "laminardb.selectorLabels" . | nindent 4 }}
{{- end }}
