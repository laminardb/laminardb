apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "laminardb.fullname" . }}
  labels:
    {{- include "laminardb.labels" . | nindent 4 }}
data:
  laminardb.toml: |
    {{- if .Values.laminardb.configOverride }}
    {{ .Values.laminardb.configOverride | nindent 4 }}
    {{- else }}
    {{- $isCluster := eq .Values.laminardb.mode "cluster" }}
    {{- $cluster := .Values.laminardb.cluster | default dict }}
    {{- if $isCluster }}
    node_id = "{{ default "${HOSTNAME}" $cluster.nodeId }}"
    {{- end }}

    [server]
    mode = "{{ if $isCluster }}cluster{{ else }}{{ .Values.laminardb.mode }}{{ end }}"
    bind = "{{ .Values.laminardb.httpBind }}"
    workers = {{ .Values.laminardb.workers }}
    log_level = "{{ .Values.laminardb.logLevel }}"
    {{- if (.Values.laminardb.consoleToken | default dict).existingSecret }}
    # Resolved from the pod env at config load; the token never enters the ConfigMap.
    console_token = "${LAMINAR_CONSOLE_TOKEN}"
    {{- end }}
    {{- with .Values.laminardb.consoleCorsAllowedOrigins }}
    console_cors_allowed_origins = [{{ range $i, $o := . }}{{ if $i }}, {{ end }}"{{ $o }}"{{ end }}]
    {{- end }}

    [state]
    backend = "{{ .Values.laminardb.state.backend }}"
    vnode_capacity = {{ .Values.laminardb.state.vnodeCapacity | default 256 }}
    {{- if eq .Values.laminardb.state.backend "local" }}
    path = "{{ .Values.laminardb.state.path }}"
    instance_id = "{{ default "${HOSTNAME}" .Values.laminardb.state.instanceId }}"
    {{- else if eq .Values.laminardb.state.backend "object_store" }}
    url = "{{ .Values.laminardb.state.url }}"
    instance_id = "{{ default "${HOSTNAME}" .Values.laminardb.state.instanceId }}"
    {{- if .Values.laminardb.state.vnodes }}
    vnodes = [{{ range $i, $v := .Values.laminardb.state.vnodes }}{{ if $i }}, {{ end }}{{ $v }}{{ end }}]
    {{- end }}
    {{- end }}

    [checkpoint]
    url = "{{ .Values.laminardb.checkpoint.url | default "file:///var/lib/laminardb/checkpoints" }}"
    interval = "{{ .Values.laminardb.checkpoint.interval }}"
    mode = "{{ .Values.laminardb.checkpoint.mode }}"
    snapshot_strategy = "{{ .Values.laminardb.checkpoint.snapshotStrategy }}"

    {{- if $isCluster }}

    [discovery]
    {{- $discovery := $cluster.discovery | default dict }}
    {{- $gossipPort := $discovery.gossipPort | default 7946 }}
    {{- $podDomain := printf "%s.%s.svc.cluster.local" (include "laminardb.headlessServiceName" .) .Release.Namespace }}
    strategy = "{{ $discovery.strategy | default "gossip" }}"
    gossip_port = {{ $gossipPort }}
    # Peers must reach this node by its per-pod headless-service DNS name; the
    # bare pod hostname the server would otherwise advertise is not resolvable.
    advertise_host = "{{ $discovery.advertiseHost | default (printf "${HOSTNAME}.%s" $podDomain) }}"
    {{- if $discovery.seeds }}
    seeds = [{{ range $i, $s := $discovery.seeds }}{{ if $i }}, {{ end }}"{{ $s }}"{{ end }}]
    {{- else }}
    # Generated from replicaCount: every node lists the full cluster (self included).
    seeds = [{{ range $i := until (int .Values.replicaCount) }}{{ if $i }}, {{ end }}"{{ include "laminardb.fullname" $ }}-{{ $i }}.{{ $podDomain }}:{{ $gossipPort }}"{{ end }}]
    {{- end }}

    [coordination]
    {{- $coordination := $cluster.coordination | default dict }}
    strategy = "{{ $coordination.strategy }}"
    raft_port = {{ $coordination.raftPort }}
    election_timeout = "{{ $coordination.electionTimeout }}"
    heartbeat_interval = "{{ $coordination.heartbeatInterval }}"
    {{- end }}

    {{- range .Values.sources }}

    [[source]]
    name = "{{ .name }}"
    connector = "{{ .connector }}"
    {{- if .format }}
    format = "{{ .format }}"
    {{- end }}
    {{- if .properties }}
    [source.properties]
    {{- range $key, $val := .properties }}
    {{ $key }} = {{ $val | quote }}
    {{- end }}
    {{- end }}
    {{- range .schema }}
    [[source.schema]]
    name = "{{ .name }}"
    type = "{{ .type }}"
    {{- if hasKey . "nullable" }}
    nullable = {{ .nullable }}
    {{- end }}
    {{- end }}
    {{- if .watermark }}
    [source.watermark]
    column = "{{ .watermark.column }}"
    {{- if .watermark.max_out_of_orderness }}
    max_out_of_orderness = "{{ .watermark.max_out_of_orderness }}"
    {{- end }}
    {{- end }}
    {{- end }}

    {{- range .Values.lookups }}

    [[lookup]]
    name = "{{ .name }}"
    connector = "{{ .connector }}"
    {{- if .strategy }}
    strategy = "{{ .strategy }}"
    {{- end }}
    {{- if .properties }}
    [lookup.properties]
    {{- range $key, $val := .properties }}
    {{ $key }} = {{ $val | quote }}
    {{- end }}
    {{- end }}
    {{- end }}

    {{- range .Values.pipelines }}

    [[pipeline]]
    name = "{{ .name }}"
    sql = """
    {{ .sql | indent 4 }}
    """
    {{- if .parallelism }}
    parallelism = {{ .parallelism }}
    {{- end }}
    {{- end }}

    {{- range .Values.sinks }}

    [[sink]]
    name = "{{ .name }}"
    pipeline = "{{ .pipeline }}"
    connector = "{{ .connector }}"
    {{- if .delivery }}
    delivery = "{{ .delivery }}"
    {{- end }}
    {{- if .properties }}
    [sink.properties]
    {{- range $key, $val := .properties }}
    {{ $key }} = {{ $val | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
