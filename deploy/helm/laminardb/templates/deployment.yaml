{{- if not (include "laminardb.useStatefulSet" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laminardb.fullname" . }}
  labels:
    {{- include "laminardb.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "laminardb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "laminardb.configChecksum" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "laminardb.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "laminardb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "laminardb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/laminardb/laminardb.toml"
            - "--log-level"
            - "{{ .Values.laminardb.logLevel }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.service.pgEnabled }}
            - name: pg
              containerPort: 5432
              protocol: TCP
            {{- end }}
            {{- if eq .Values.laminardb.mode "delta" }}
            - name: gossip
              containerPort: {{ .Values.laminardb.delta.discovery.gossipPort }}
              protocol: TCP
            - name: raft
              containerPort: {{ .Values.laminardb.delta.coordination.raftPort }}
              protocol: TCP
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if or .Values.guaranteedQoS .Values.resources }}
          resources:
            {{- if .Values.guaranteedQoS }}
            {{- $limits := .Values.resources.limits | default dict }}
            limits:
              {{- toYaml $limits | nindent 14 }}
            requests:
              {{- toYaml $limits | nindent 14 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            {{- if eq .Values.laminardb.mode "delta" }}
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/laminardb
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.state.enabled }}
            - name: state
              mountPath: /var/lib/laminardb/state
            {{- end }}
            {{- if .Values.persistence.checkpoints.enabled }}
            - name: checkpoints
              mountPath: /var/lib/laminardb/checkpoints
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "laminardb.fullname" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.state.enabled }}
        - name: state
          {{- if .Values.persistence.state.useEmptyDir }}
          emptyDir:
            {{- if .Values.persistence.state.emptyDirMedium }}
            medium: {{ .Values.persistence.state.emptyDirMedium }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.persistence.checkpoints.enabled }}
        - name: checkpoints
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
