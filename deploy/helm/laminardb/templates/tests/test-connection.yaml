apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "laminardb.fullname" . }}-test-connection"
  labels:
    {{- include "laminardb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  serviceAccountName: {{ include "laminardb.serviceAccountName" . }}
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: wget
      image: "{{ .Values.testConnection.image.repository }}:{{ .Values.testConnection.image.tag }}"
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "laminardb.fullname" . }}:{{ .Values.service.httpPort }}/health']
  restartPolicy: Never
