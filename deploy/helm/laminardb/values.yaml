# -- Number of replicas (use 1 for embedded, >1 for cluster mode)
replicaCount: 1

# -- StatefulSet pod launch ordering: "Parallel" or "OrderedReady".
# -- Immutable on a live StatefulSet (delete with --cascade=orphan to change).
podManagementPolicy: Parallel

image:
  # -- Docker image repository
  repository: laminardb/laminardb-server
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Docker registry pull secrets
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- LaminarDB server configuration
laminardb:
  # -- Server mode: "embedded" (single-node) or "cluster" (multi-node clustering)
  mode: embedded
  # -- Log level: trace, debug, info, warn, error
  logLevel: info
  # -- HTTP API bind address
  httpBind: "0.0.0.0:8080"
  # -- Number of worker threads (0 = auto-detect)
  workers: 0
  # -- Prometheus metrics endpoint
  metrics:
    enabled: true
    bind: "0.0.0.0:8080"

  # -- State storage configuration
  state:
    # -- Backend type: "in_process", "local", or "object_store"
    backend: local
    # -- Path for persistent state (required when backend=local)
    path: /var/lib/laminardb/state
    # -- URL for shared storage (required when backend=object_store, e.g. "s3://bucket/prefix")
    url: ""
    # -- Node identity written into state commit markers (defaults to ${HOSTNAME})
    instanceId: ""
    # -- Number of vnodes the backend should size for
    vnodeCapacity: 256
    # -- Optional static vnode list (only for object_store backend)
    vnodes: []

  # -- Checkpoint configuration
  checkpoint:
    # -- Enable checkpointing
    enabled: true
    # -- Checkpoint interval (Go/humantime duration)
    interval: "30s"
    # -- Checkpoint storage URL. Use an object store (s3://, gs://, az://) for durable
    # checkpoints; empty falls back to a local path (non-durable unless checkpoints PVC enabled).
    url: ""
    # -- Checkpoint mode: "aligned" or "unaligned"
    mode: aligned
    # -- Snapshot strategy: "full", "incremental", or "fork_cow"
    snapshotStrategy: full

  # -- Bearer token for the control-plane (console) HTTP API, read from an
  # -- existing Secret. Empty existingSecret = unauthenticated API (dev only).
  consoleToken:
    existingSecret: ""
    secretKey: "token"

  # -- CORS allow-list of console origins, e.g. ["https://console.example.com"].
  # -- Empty falls back to the permissive legacy policy (dev only).
  consoleCorsAllowedOrigins: []

  # -- Hot-reload config on file change. Off in K8s: config changes already roll pods
  # (checksum/config annotation) and the watcher spams reloads on ConfigMap mounts.
  configWatch: false

  # -- Custom laminardb.toml configuration (overrides all above).
  # -- If set, this raw TOML string is used as the config file directly.
  configOverride: ""

  # -- Cluster settings (only when mode=cluster)
  cluster:
    # -- Node ID (auto-generated from pod name if empty)
    nodeId: ""
    discovery:
      # -- Discovery strategy: "gossip" (recommended) or "static"
      strategy: gossip
      # -- Gossip port
      gossipPort: 7946
      # -- Seed nodes. Empty = generated from replicaCount as
      # -- <fullname>-N.<headless>.<namespace>.svc.cluster.local:<gossipPort>
      seeds: []
      # -- Host peers use to reach this node. Empty = the pod's headless-service
      # -- DNS name (override only for non-standard network setups)
      advertiseHost: ""
    coordination:
      # -- Coordination strategy (only "raft" supported)
      strategy: raft
      # -- Raft port
      raftPort: 7947
      # -- Raft election timeout
      electionTimeout: "1500ms"
      # -- Raft heartbeat interval
      heartbeatInterval: "300ms"

# -- Pipeline definitions (rendered into laminardb.toml [[pipeline]] sections)
# -- Each entry needs: name, sql, and optionally parallelism
pipelines: []
# Example:
# - name: trade-volumes
#   sql: |
#     SELECT symbol, SUM(volume) as total_vol
#     FROM trades
#     GROUP BY symbol, TUMBLE(event_time, INTERVAL '1' MINUTE)
#   parallelism: 4

# -- Source definitions (rendered into laminardb.toml [[source]] sections)
sources: []
# Example:
# - name: trades
#   connector: kafka
#   format: json
#   properties:
#     brokers: "kafka:9092"
#     topic: raw-trades
#     group_id: laminardb-trades
#   schema:
#     - name: symbol
#       type: VARCHAR
#       nullable: false
#     - name: price
#       type: DOUBLE
#   watermark:
#     column: event_time
#     max_out_of_orderness: "5s"

# -- Lookup table definitions (rendered into laminardb.toml [[lookup]] sections)
lookups: []
# Example:
# - name: instruments
#   connector: postgres
#   strategy: poll
#   properties:
#     connection_string: "postgres://localhost/market_data"
#     table: instruments

# -- Sink definitions (rendered into laminardb.toml [[sink]] sections)
sinks: []
# Example:
# - name: output
#   pipeline: trade-volumes
#   connector: kafka
#   delivery: at_least_once
#   properties:
#     brokers: "kafka:9092"
#     topic: trade-volumes

serviceAccount:
  # -- Create a service account
  create: true
  # -- Automount API credentials
  automount: true
  # -- Service account annotations
  annotations: {}
  # -- Service account name (generated if empty)
  name: ""

# -- Pod annotations
podAnnotations: {}
# -- Pod labels
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- HTTP API port
  httpPort: 8080
  # -- PostgreSQL wire protocol port (future)
  pgPort: 5432
  # -- Enable PostgreSQL wire protocol port
  pgEnabled: false
  # -- Gossip port for cluster mode discovery
  gossipPort: 7946
  # -- Raft port for cluster mode coordination
  raftPort: 7947
  # -- Service annotations
  annotations: {}

# -- Headless service for cluster mode DNS discovery
headlessService:
  # -- Enable headless service (auto-enabled when mode=cluster)
  enabled: false

# -- Ingress configuration (for HTTP API)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: laminardb.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# -- Resource requests and limits
resources: {}
# Example for production:
# limits:
#   cpu: "4"
#   memory: 8Gi
# requests:
#   cpu: "2"
#   memory: 4Gi

# -- Persistence for state and checkpoints
persistence:
  state:
    # -- Enable persistent state storage
    enabled: true
    # -- Storage class (empty = default)
    storageClass: ""
    # -- Access modes
    accessModes: [ReadWriteOnce]
    # -- Volume size
    size: 10Gi
    # -- Use emptyDir instead of PVC (volatile)
    useEmptyDir: false
    # -- emptyDir medium (set to "Memory" for tmpfs)
    emptyDirMedium: ""
  checkpoints:
    # -- Provision a dedicated checkpoints PVC. Off by default — prefer an object
    # store (laminardb.checkpoint.url); the local fallback path then uses a
    # volatile emptyDir.
    enabled: false
    # -- Storage class (empty = default)
    storageClass: ""
    # -- Access modes
    accessModes: [ReadWriteOnce]
    # -- Volume size
    size: 50Gi

# -- Node selector
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}

# -- For thread-per-core: request guaranteed CPU.
# -- Set to true to use Guaranteed QoS class (requests == limits).
guaranteedQoS: false

# -- Topology spread constraints (useful for cluster mode)
topologySpreadConstraints: []

# -- Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Autoscaling (mainly for cluster mode)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# -- ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: false
  # -- Namespace for the ServiceMonitor (defaults to release namespace)
  namespace: ""
  # -- Scrape interval
  interval: 15s
  # -- Scrape timeout
  scrapeTimeout: 10s
  # -- Additional labels for the ServiceMonitor
  labels: {}
  # -- Metric relabeling configs
  metricRelabelings: []
  # -- Relabeling configs
  relabelings: []

# -- PrometheusRule for alerting
prometheusRule:
  enabled: false
  # -- Namespace for the PrometheusRule
  namespace: ""
  # -- Additional labels
  labels: {}
  # -- Alert rules
  rules: []
  # Example:
  # - alert: LaminarDBPipelineDown
  #   expr: laminardb_pipeline_state_info{state="Stopped"} == 1
  #   for: 5m
  #   labels:
  #     severity: critical
  #   annotations:
  #     summary: "LaminarDB pipeline is down"

# -- Grafana dashboard ConfigMap
grafanaDashboard:
  enabled: false
  # -- Labels to apply to the dashboard ConfigMap
  labels:
    grafana_dashboard: "1"

# -- Init containers
initContainers: []

# -- Extra environment variables
extraEnv: []
# - name: RUST_LOG
#   value: "laminardb=debug"

# -- Extra environment variables source (e.g. from ConfigMaps or Secrets)
extraEnvFrom: []
# - secretRef:
#     name: laminardb-secrets
# - configMapRef:
#     name: laminardb-config

# -- Extra volumes
extraVolumes: []
# -- Extra volume mounts
extraVolumeMounts: []

# -- Network policy
networkPolicy:
  enabled: false
  ingress: []
  egress: []
