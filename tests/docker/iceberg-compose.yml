# MinIO + Iceberg REST catalog for the coordinated-commit integration test.
#
#   docker compose -f tests/docker/iceberg-compose.yml up -d --wait
#   cargo test -p laminar-connectors --test iceberg_coordinated_commit \
#     --features iceberg -- --ignored
#   docker compose -f tests/docker/iceberg-compose.yml down -v
#
# The sink reaches MinIO/REST via localhost:9000 / localhost:8181; the REST
# catalog reaches MinIO via the docker network (minio:9000).

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 30

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mc alias set local http://minio:9000 minioadmin minioadmin && mc mb -p local/warehouse || true

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.9.2
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/wh
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
