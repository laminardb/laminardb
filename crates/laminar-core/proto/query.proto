syntax = "proto3";

// In-engine distributed query (pull path): a coordinator fans `RemoteScan` out
// to peers owning part of a table/MV and unions their Arrow batches. Shares the
// `BarrierSync` control-plane port.
package laminar.query.v1;

service QueryService {
  // Stream the serving node's local rows in row-bounded Arrow IPC chunks; an
  // empty local slice is one schema-only chunk.
  rpc RemoteScan(RemoteScanRequest) returns (stream RemoteScanResponse);
}

message RemoteScanRequest {
  // Table / materialized-view name to scan on the serving node.
  string table_name = 1;
  // Optional column projection (field indices); empty means all columns.
  repeated uint32 projection = 2;
  // Optional pushed-down predicate as a SQL boolean expression over the table's
  // columns; empty means no filter. Applied by the serving node before
  // serialization. The coordinator re-applies the filter above the union, so an
  // over-broad remote result is still correct (pushdown is an optimization).
  string filter_sql = 3;
}

message RemoteScanResponse {
  // Arrow IPC stream encoding of one RecordBatch (schema + batch).
  bytes arrow_ipc = 1;
}
