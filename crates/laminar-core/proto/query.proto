syntax = "proto3";

// In-engine distributed query coordination (pull path). A coordinator node
// fans a `RemoteScan` out to every peer that owns part of a distributed table
// / materialized view and unions the per-node Arrow batches into the query
// result. Each peer streams the Arrow IPC encoding of its locally-held rows.
//
// Runs on the same control-plane port as `BarrierSync` (see
// `crates/laminar-core/src/cluster/control/barrier.rs`); peer addresses are
// discovered through the same `barrier:addr` gossip key.
//
// Code is generated by tonic-build (see this crate's build.rs).
package laminar.query.v1;

service QueryService {
  // Stream the caller-named table's locally-held rows back to a peer
  // coordinator. The response is chunked so a large result need not be
  // buffered whole; each chunk is one self-describing Arrow IPC stream.
  rpc RemoteScan(RemoteScanRequest) returns (stream RemoteScanResponse);
}

message RemoteScanRequest {
  // Table / materialized-view name to scan on the serving node.
  string table_name = 1;
  // Optional column projection (field indices into the table schema).
  // Empty means "all columns".
  repeated uint32 projection = 2;
}

message RemoteScanResponse {
  // Arrow IPC stream encoding of one RecordBatch (schema + batch), produced
  // by `serialization::serialize_batch_stream`.
  bytes arrow_ipc = 1;
}
