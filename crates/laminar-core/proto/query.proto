syntax = "proto3";

// In-engine distributed query (pull path): a coordinator fans `RemoteScan` out
// to peers owning part of a table/MV and unions their Arrow batches. Shares the
// `BarrierSync` control-plane port.
package laminar.query.v1;

service QueryService {
  // Stream the serving node's local rows in row-bounded chunks. The chunks form
  // a single Arrow IPC stream: the first chunk carries the schema (plus the
  // first batch), every later chunk carries only a record-batch message, so the
  // schema is sent once instead of with every chunk. An empty local slice is one
  // chunk (schema + empty batch).
  rpc RemoteScan(RemoteScanRequest) returns (stream RemoteScanResponse);
}

message RemoteScanRequest {
  // Table / materialized-view name to scan on the serving node.
  string table_name = 1;
  // Optional column projection (field indices); empty means all columns.
  repeated uint32 projection = 2;
  // Optional pushed-down predicate (SQL boolean expr); empty means no filter.
  // Applied before serialization; the coordinator re-applies it (optimization).
  string filter_sql = 3;
}

message RemoteScanResponse {
  // One slice of a single Arrow IPC stream. The first chunk of a response holds
  // the schema message followed by the first record batch; every subsequent
  // chunk holds only a record-batch (and any dictionary) message. Concatenating
  // a response's chunks in order yields one valid Arrow IPC stream. Produced by
  // `serialization::BatchStreamEncoder`, consumed by `BatchStreamDecoder`.
  bytes arrow_ipc = 1;
}
