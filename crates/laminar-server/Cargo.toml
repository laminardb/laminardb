[package]
name = "laminar-server"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://laminardb.io/api/laminar_server"
description = "Standalone server binary for LaminarDB"
publish = false

[[bin]]
name = "laminardb"
path = "src/main.rs"

[dependencies]
# All LaminarDB crates
laminar-core = { path = "../laminar-core", version = "0.18.0", features = ["delta"] }
laminar-sql = { path = "../laminar-sql", version = "0.18.0" }
laminar-storage = { path = "../laminar-storage", version = "0.18.0" }
laminar-connectors = { path = "../laminar-connectors", version = "0.18.0" }
laminar-db = { path = "../laminar-db", version = "0.18.0" }

# CLI and configuration
clap = { version = "4.5", features = ["derive", "env"] }
config = "0.15"
directories = "6.0"

# Async runtime
tokio = { workspace = true, features = ["full"] }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
toml = "1.0"

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }

# Config helpers
regex = { workspace = true }
humantime-serde = { workspace = true }
chrono = { workspace = true }

# File watching for hot reload
notify = { workspace = true }

# Delta mode: hostname discovery and unique node IDs
gethostname = { workspace = true }
uuid = { workspace = true }
xxhash-rust = { workspace = true }

# Vendored OpenSSL for musl cross-compilation (behind vendored-openssl feature)
openssl = { version = "0.10", features = ["vendored"], optional = true }

# Allocator: jemalloc for reduced fragmentation in Ring 1/2 (Unix only).
# tikv-jemallocator does not support Windows MSVC.
[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
# Cross-platform defaults. On Linux, add `--features linux-perf` for
# io_uring, NUMA topology, and XDP/eBPF optimizations.
default = [
    "jemalloc",
    "jit",
    "kafka",
    "websocket",
    "delta-lake",
    "postgres-cdc",
    "postgres-sink",
    "mysql-cdc",
    "files",
    "parquet-lookup",
]
jemalloc = ["dep:tikv-jemallocator"]
# Connector features (forwarded to laminar-db → laminar-connectors)
kafka = ["laminar-db/kafka"]
websocket = ["laminar-db/websocket"]
postgres-cdc = ["laminar-db/postgres-cdc"]
postgres-sink = ["laminar-db/postgres-sink"]
mysql-cdc = ["laminar-db/mysql-cdc"]
delta-lake = ["laminar-db/delta-lake"]
files = ["laminar-db/files"]
parquet-lookup = ["laminar-db/parquet-lookup"]
# Cloud object store backends for checkpoints
aws = ["laminar-db/aws"]
gcs = ["laminar-db/gcs"]
azure = ["laminar-db/azure"]
# Performance features
jit = ["laminar-db/jit"]                    # All platforms: Cranelift JIT for Ring 0
# Linux-only performance features (cannot be default — crates won't compile on Windows/macOS)
io-uring = ["laminar-storage/io-uring"]     # Linux 5.10+: async I/O for WAL/checkpoints
hwloc = ["laminar-core/hwloc"]              # Linux/macOS: NUMA topology discovery
xdp = ["laminar-core/xdp"]                  # Linux 4.15+: XDP/eBPF network optimization
# Meta-feature: enable all Linux-specific performance optimizations.
# Recommended for production Linux deployments:
#   cargo build --release --features linux-perf
linux-perf = ["io-uring", "hwloc", "xdp"]
# Compile OpenSSL from source — required for musl cross-compilation where
# system libssl-dev is not available for the target triple.
vendored-openssl = ["dep:openssl"]
