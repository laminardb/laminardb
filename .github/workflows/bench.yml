name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Reduce criterion sample count for CI (default 100 samples + 5s measurement
  # per benchmark causes timeouts on GitHub runners). 10 samples with shorter
  # warmup/measurement is sufficient for regression detection.
  BENCH_ARGS: "--noplot --sample-size 10 --warm-up-time 1 --measurement-time 3"

jobs:
  # Build every bench binary once and publish them as an artifact; the run jobs
  # below download and execute them instead of each recompiling the workspace.
  build:
    name: Build Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-build
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libelf-dev zlib1g-dev libcurl4-openssl-dev cmake pkg-config libsasl2-dev libudev-dev protobuf-compiler

      - name: Build and stage bench binaries
        # `--no-default-features`: benches need only core engine APIs; the connector
        # stack is dead weight that overran the build timeout. JSON output gives each
        # bench executable's path, which we copy to its stable (de-hashed) name.
        run: |
          set -euo pipefail
          mkdir -p bench-bin
          cargo build --release -p laminar-core -p laminar-db --benches \
            --no-default-features --message-format=json \
            | jq -r 'select(.reason == "compiler-artifact" and (.target.kind | index("bench")) and .executable != null) | .executable' \
            | while read -r exe; do
                cp "$exe" "bench-bin/$(basename "$exe" | sed -E 's/-[0-9a-f]+$//')"
              done
          chmod +x bench-bin/*
          ls -la bench-bin

      - name: Upload bench binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-benches
          path: bench-bin/
          if-no-files-found: error
          retention-days: 1

  # Core latency-critical benchmarks
  bench-latency:
    name: Latency Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bench binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-benches
          path: bench-bin
      - name: Run latency benchmarks
        run: |
          chmod +x bench-bin/*
          ./bench-bin/latency_bench --bench $BENCH_ARGS 2>&1 | tee results.txt
          ./bench-bin/cache_bench --bench $BENCH_ARGS 2>&1 | tee -a results.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-latency
          path: results.txt

  # DAG pipeline benchmarks
  bench-dag:
    name: DAG Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bench binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-benches
          path: bench-bin
      - name: Run DAG benchmarks
        run: |
          chmod +x bench-bin/*
          ./bench-bin/stream_executor_bench --bench $BENCH_ARGS 2>&1 | tee results.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-dag
          path: results.txt

  # Operator benchmarks (windows, joins, streaming)
  bench-operators:
    name: Operator Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bench binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-benches
          path: bench-bin
      - name: Run operator benchmarks
        run: |
          chmod +x bench-bin/*
          ./bench-bin/window_bench --bench $BENCH_ARGS 2>&1 | tee results.txt
          ./bench-bin/lookup_join_bench --bench $BENCH_ARGS 2>&1 | tee -a results.txt
          ./bench-bin/streaming_bench --bench $BENCH_ARGS 2>&1 | tee -a results.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-operators
          path: results.txt

  # Throughput and TPC benchmarks
  bench-throughput:
    name: Throughput Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bench binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-benches
          path: bench-bin
      - name: Run throughput benchmarks
        run: |
          chmod +x bench-bin/*
          ./bench-bin/hot_path_micro --bench $BENCH_ARGS 2>&1 | tee results.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-throughput
          path: results.txt

  # Storage benchmarks (WAL, checkpointing)
  bench-storage:
    name: Storage Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download bench binaries
        uses: actions/download-artifact@v8
        with:
          name: compiled-benches
          path: bench-bin
      - name: Run storage benchmarks
        run: |
          chmod +x bench-bin/*
          ./bench-bin/recovery_bench --bench $BENCH_ARGS 2>&1 | tee results.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-storage
          path: results.txt

  # Collect and publish results
  publish-results:
    name: Publish Results
    needs: [bench-latency, bench-dag, bench-operators, bench-throughput, bench-storage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # `pattern: bench-*` keeps the (large) compiled-benches artifact out of
      # this download — we only want each job's results.txt.
      - name: Download result artifacts
        uses: actions/download-artifact@v8
        with:
          path: bench-results
          pattern: bench-*

      - name: Combine results
        run: |
          echo "# Benchmark Results" > bench_output.txt
          echo "" >> bench_output.txt
          for dir in bench-results/*/; do
            name=$(basename "$dir")
            echo "## $name" >> bench_output.txt
            cat "$dir/results.txt" >> bench_output.txt
            echo "" >> bench_output.txt
          done

      - name: Generate summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latency Targets" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| State lookup | < 500ns | See artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "| Routing lookup | < 50ns | See artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "| 3-node latency | < 500ns | See artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "| Throughput/core | > 500K/s | See artifacts |" >> $GITHUB_STEP_SUMMARY

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: LaminarDB Benchmarks
          tool: 'cargo'
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: bench
        continue-on-error: true

      - name: Upload combined results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-combined
          path: bench_output.txt
